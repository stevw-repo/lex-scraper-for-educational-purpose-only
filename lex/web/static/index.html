<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lex Scraper</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1>Lex Scraper</h1>
    <div class="status">
      <span id="loginDot" class="dot"></span>
      <span id="activity" class="pill">idle</span>
      <span id="publication" class="muted">no publication loaded</span>
    </div>
  </header>

  <section class="bar">
    <div class="row">
      <button id="login">Log in</button>
      <button id="confirm" class="warn" hidden>Continue (I'm logged in)</button>
      <input id="puburl" type="text" spellcheck="false"
             placeholder="Publication Table-of-Contents URL  ( …/apac/toc?…pdtocfullpath=… )">
      <button id="go">Go to publication</button>
    </div>
    <div class="row">
      <button id="scrapeAll" class="go">▶ Scrape all titles</button>
      <button id="scrapeSel">▶ Scrape selected</button>
      <button id="pause">⏸ Pause</button>
      <button id="resume" hidden>▶ Resume</button>
      <button id="stop" class="danger">⏹ Stop</button>
      <button id="retryAll">↻ Retry failures</button>
      <button id="build">⤓ Rebuild JSONL</button>
      <span class="spacer"></span>
      <label class="pacing">pacing
        <input id="pmin" type="number" min="0" step="0.5"> –
        <input id="pmax" type="number" min="0" step="0.5"> s
        <button id="applyPacing">set</button>
      </label>
    </div>
  </section>

  <section id="overall" class="overall" hidden>
    <div class="progress"><div id="overallBar" class="fill"></div></div>
    <div id="overallText" class="muted"></div>
    <div id="current" class="current"></div>
  </section>

  <section class="titles">
    <table>
      <thead>
        <tr><th class="sel"><input type="checkbox" id="selAll" title="Select all"></th>
            <th>#</th><th>Title</th><th class="num">Progress</th><th>Status</th><th class="act">Actions</th></tr>
      </thead>
      <tbody id="titleRows">
        <tr><td colspan="6" class="muted">Log in and load a publication to list its titles.</td></tr>
      </tbody>
    </table>
  </section>

  <section class="logwrap">
    <div class="loghead">Activity log</div>
    <pre id="log"></pre>
  </section>

  <script src="/app.js"></script>
</body>
</html>
